<ion-card>
  <ion-card-header>
    <ion-card-title>{{ transaccion.categoria }}</ion-card-title>
    <ion-card-subtitle>{{ transaccion.fecha | dateFormat }}</ion-card-subtitle>
  </ion-card-header>

  <ion-card-content>
    <ion-list lines="none">
      <ion-item>
        <ion-label>
          <strong>Monto:</strong> {{ transaccion.monto | currencyFormat }}
        </ion-label>
      </ion-item>
      <ion-item>
        <ion-label>
          <strong>Tipo:</strong> {{ transaccion.tipo }}
        </ion-label>
      </ion-item>
      <ion-item *ngIf="transaccion.descripcion">
        <ion-label>
          <strong>Descripción:</strong> {{ transaccion.descripcion }}
        </ion-label>
      </ion-item>
    </ion-list>

    <ion-grid>
      <ion-row *ngIf="transaccion.comprobante">
        <ion-col size="12">
          <app-photo-preview
            [src]="transaccion.comprobante"
            size="large"
            (onClick)="abrirGaleriaFotos()">
          </app-photo-preview>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col size="6">
          <ion-button expand="block" color="primary" (click)="onEdit.emit()">Editar</ion-button>
        </ion-col>
        <ion-col size="6">
          <ion-button expand="block" color="danger" (click)="onDelete.emit()">Eliminar</ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </ion-card-content>
</ion-card>
