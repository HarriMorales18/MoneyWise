<label class="field-label">{{ label }}</label>
<ion-item [disabled]="disabled">
  <ion-input
    [type]="type"
    [name]="name"
    [placeholder]="placeholder"
    [attr.inputmode]="type === 'number' ? 'decimal' : null"
    [attr.pattern]="type === 'number' ? '[0-9]+([\\.,][0-9]{1,2})?' : null"
    [attr.step]="type === 'number' ? '0.01' : null"
    [class.amount-input]="type === 'number'"
    [attr.aria-label]="label"
    [autocomplete]="autocomplete"
    [autocapitalize]="autocapitalize"
    [spellcheck]="spellcheck"
    [value]="value"
    (ionInput)="valueChange($event)"
    (ionBlur)="blur()">
  </ion-input>
  <ion-note *ngIf="error" color="danger">{{ error }}</ion-note>
</ion-item>
